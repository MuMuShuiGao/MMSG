<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MMSG Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f6f8fb; color: #111827; min-height: 100vh; }
#root { display: flex; flex-direction: column; height: 100vh; }
.header { background: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 24px; border-bottom: 1px solid #e5e7eb; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); }
.header h1 { font-size: 18px; color: #1f2937; white-space: nowrap; }
.tabs { display: flex; gap: 6px; }
.tab { padding: 7px 16px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; color: #4b5563; cursor: pointer; font-size: 13px; transition: all .15s; }
.tab:hover { border-color: #2563eb; color: #2563eb; background: #f8fafc; }
.tab.active { background: #2563eb; border-color: #2563eb; color: #fff; box-shadow: 0 1px 2px rgba(37, 99, 235, .18); }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 280px; min-width: 280px; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; }
.sidebar-header { padding: 12px; border-bottom: 1px solid #e5e7eb; }
.sidebar-header input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; color: #111827; font-size: 13px; outline: none; }
.sidebar-header input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .1); }
.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 10px; transition: background .1s; margin-bottom: 2px; color: #374151; }
.session-item:hover { background: #f3f4f6; }
.session-item.selected { background: #eff6ff; color: #1d4ed8; }
.session-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .time-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.session-item .ts { font-size: 11px; color: #9ca3af; white-space: nowrap; }
.session-item .del-btn { visibility: hidden; background: none; border: none; color: #dc2626; cursor: pointer; font-size: 14px; padding: 0 4px; flex-shrink: 0; }
.session-item:hover .del-btn { visibility: visible; }
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f6f8fb; }
.content-header { padding: 12px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 12px; background: #fff; }
.content-header input { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; color: #111827; font-size: 14px; outline: none; }
.content-header input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .1); }
.content-header button { padding: 7px 16px; border-radius: 8px; border: none; background: #2563eb; color: #fff; cursor: pointer; font-size: 13px; }
.content-header button:hover { background: #1d4ed8; }
.msg-list { flex: 1; overflow-y: auto; padding: 18px 24px; }
.msg { margin-bottom: 16px; max-width: 85%; }
.msg.user { margin-left: auto; }
.msg.user .bubble { background: #dbeafe; color: #1e3a8a; border-radius: 12px 12px 0 12px; border: 1px solid #bfdbfe; }
.msg.assistant .bubble { background: #fff; color: #111827; border-radius: 12px 12px 12px 0; border: 1px solid #e5e7eb; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); }
.msg.system .bubble { background: #fef9c3; color: #713f12; border-radius: 12px; border: 1px solid #fde68a; font-size: 12px; }
.msg.tool .bubble { background: #dcfce7; color: #14532d; border-radius: 12px; border: 1px solid #bbf7d0; font-size: 12px; font-family: monospace; }
.bubble { padding: 10px 14px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.msg .role-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.msg .msg-id { font-size: 10px; color: #9ca3af; }
.msg .edit-btn { background: none; border: none; color: #2563eb; cursor: pointer; font-size: 11px; }
.msg textarea { width: 100%; min-height: 60px; padding: 8px; border-radius: 8px; border: 1px solid #2563eb; background: #fff; color: #111827; font-size: 13px; resize: vertical; outline: none; font-family: inherit; box-shadow: 0 0 0 3px rgba(37, 99, 235, .1); }
.msg .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
.msg .edit-actions button { padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; }
.msg .edit-actions .save-btn { background: #2563eb; color: #fff; }
.msg .edit-actions .cancel-btn { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; }
	.usage-panel { flex: 1; padding: 16px; overflow: auto; background: #f6f8fb; }
	.usage-cards { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
	.usage-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); }
	.usage-card .label { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
	.usage-card .value { font-size: 24px; font-weight: 700; color: #1f2937; }
	.usage-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); }
	.usage-table th, .usage-table td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; text-align: right; font-size: 13px; }
	.usage-table th:first-child, .usage-table td:first-child { text-align: left; }
	.usage-table th { background: #f9fafb; color: #4b5563; font-weight: 600; }
	.usage-table tr:last-child td { border-bottom: none; }
    .memory-panel { flex: 1; display: flex; gap: 16px; padding: 16px; overflow: hidden; background: #f6f8fb; }
.memory-col { flex: 1; display: flex; flex-direction: column; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); }
.memory-col h3 { margin-bottom: 10px; font-size: 14px; color: #1f2937; display: flex; align-items: center; justify-content: space-between; }
.memory-col h3 button { padding: 5px 12px; border-radius: 7px; border: none; background: #2563eb; color: #fff; cursor: pointer; font-size: 12px; }
.memory-col h3 button:hover { background: #1d4ed8; }
.memory-col textarea { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; background: #fff; color: #111827; font-size: 13px; resize: none; outline: none; font-family: "Fira Code", "Cascadia Code", monospace; line-height: 1.6; }
.memory-col textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .1); }
.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #9ca3af; font-size: 14px; }
.saved-toast { position: fixed; bottom: 20px; right: 20px; background: #16a34a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .3s; z-index: 999; box-shadow: 0 6px 20px rgba(22, 163, 74, .2); }
.saved-toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="saved-toast">✓ 已保存</div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── helpers ──
const api = (url, opts) => fetch(url, opts).then(r => r.ok ? r.json() : Promise.reject(r));
const fmtTs = ts => ts ? new Date(ts).toLocaleString("zh-CN", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
const fmtNum = n => Number(n || 0).toLocaleString("zh-CN");
const usageOf = m => (m.meta && m.meta.usage) || {};
const usageText = usage => {
  const total = usage.total_tokens;
  if (total == null) return "";
  return `token ${fmtNum(total)} (in ${fmtNum(usage.prompt_tokens)}, out ${fmtNum(usage.completion_tokens)})`;
};
const toast = msg => { const e = document.getElementById("toast"); e.textContent = msg; e.classList.add("show"); setTimeout(() => e.classList.remove("show"), 1500); };

// ── Sessions Tab ──
function SessionsView() {
  const [sessions, setSessions] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [search, setSearch] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [editText, setEditText] = useState("");
  const [titleEdit, setTitleEdit] = useState(null);

  useEffect(() => { api("/api/sessions").then(setSessions).catch(() => {}); }, []);

  const selectSession = id => {
    setSelectedId(id);
    setEditingId(null);
    api(`/api/sessions/${id}/messages`).then(setMessages).catch(() => setMessages([]));
  };

  const delSession = async (id) => {
    if (!confirm("确定删除此会话？")) return;
    await api(`/api/sessions/${id}`, { method: "DELETE" });
    setSessions(prev => prev.filter(s => s.id !== id));
    if (selectedId === id) { setSelectedId(null); setMessages([]); }
    toast("会话已删除");
  };

  const startEdit = msg => { setEditingId(msg.id); setEditText(msg.content); };
  const cancelEdit = () => setEditingId(null);
  const saveEdit = async (msgId) => {
    await api(`/api/messages/${msgId}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({content: editText}) });
    setMessages(prev => prev.map(m => m.id === msgId ? {...m, content: editText} : m));
    setEditingId(null);
    toast("消息已保存");
  };

  const saveTitle = async (id, title) => {
    await api(`/api/sessions/${id}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({title}) });
    setSessions(prev => prev.map(s => s.id === id ? {...s, title} : s));
    setTitleEdit(null);
    toast("标题已保存");
  };

  const filtered = sessions.filter(s => {
    if (!search) return true;
    const q = search.toLowerCase();
    return (s.title||"").toLowerCase().includes(q) || (s.id||"").toLowerCase().includes(q);
  });

  return (
    <div className="main">
      <div className="sidebar">
        <div className="sidebar-header">
          <input placeholder="搜索会话..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div className="session-list">
          {filtered.map(s => (
            <div key={s.id} className={`session-item${selectedId === s.id ? " selected" : ""}`} onClick={() => selectSession(s.id)}>
              <span className="title" title={s.title || s.id}>
                {s.title || s.id}
              </span>
              <div className="time-info" title={`创建：${new Date(s.created_at).toLocaleString("zh-CN")}\n最新：${new Date(s.updated_at).toLocaleString("zh-CN")}`}>
                <span className="ts">创建 {fmtTs(s.created_at)}</span>
                <span className="ts">最新 {fmtTs(s.updated_at)}</span>
              </div>
              <button className="del-btn" onClick={e => { e.stopPropagation(); delSession(s.id); }} title="删除">✕</button>
            </div>
          ))}
          {filtered.length === 0 && <div style={{padding:16,color:"#555",fontSize:13}}>暂无会话</div>}
        </div>
      </div>
      <div className="content">
        {selectedId ? (
          <>
            <div className="content-header">
              {titleEdit === selectedId ? (
                <>
                  <input autoFocus value={sessions.find(s=>s.id===selectedId)?.title||""} onChange={e => setSessions(prev => prev.map(s => s.id===selectedId ? {...s, title: e.target.value} : s))} onKeyDown={e => { if (e.key==="Enter") saveTitle(selectedId, sessions.find(s=>s.id===selectedId)?.title||""); if (e.key==="Escape") setTitleEdit(null); }} />
                  <button onClick={() => saveTitle(selectedId, sessions.find(s=>s.id===selectedId)?.title||"")}>保存</button>
                  <button style={{background:"#333"}} onClick={() => setTitleEdit(null)}>取消</button>
                </>
              ) : (
                <>
                  <strong style={{cursor:"pointer"}} onClick={() => setTitleEdit(selectedId)} title="点击编辑标题">
                    {sessions.find(s=>s.id===selectedId)?.title || selectedId} ▾
                  </strong>
                  <span style={{fontSize:11,color:"#555"}}>({messages.length} 条消息)</span>
                  <span style={{fontSize:11,color:"#6b7280"}}>创建：{fmtTs(sessions.find(s=>s.id===selectedId)?.created_at)}</span>
                  <span style={{fontSize:11,color:"#6b7280"}}>最新：{fmtTs(sessions.find(s=>s.id===selectedId)?.updated_at)}</span>
                </>
              )}
            </div>
            <div className="msg-list">
              {messages.map(m => (
                <div key={m.id} className={`msg ${m.role}`}>
                  <div className="role-label">
                    <span>{m.role}</span>
                    <span className="msg-id">#{m.id}</span>
                    {usageText(usageOf(m)) && <span className="msg-id">{usageText(usageOf(m))}</span>}
                    {editingId !== m.id && <button className="edit-btn" onClick={() => startEdit(m)}>编辑</button>}
                  </div>
                  {editingId === m.id ? (
                    <>
                      <textarea value={editText} onChange={e => setEditText(e.target.value)} />
                      <div className="edit-actions">
                        <button className="save-btn" onClick={() => saveEdit(m.id)}>保存</button>
                        <button className="cancel-btn" onClick={cancelEdit}>取消</button>
                      </div>
                    </>
                  ) : (
                    <div className="bubble">{m.content}</div>
                  )}
                </div>
              ))}
            </div>
          </>
        ) : (
          <div className="empty-state">← 从左侧选择一个会话</div>
        )}
      </div>
    </div>
  );
}

// ── Usage Tab ──
function UsageView() {
  const [usage, setUsage] = useState({total: {}, sessions: []});

  useEffect(() => { api("/api/usage/summary").then(setUsage).catch(() => {}); }, []);

  const total = usage.total || {};
  const sessions = usage.sessions || [];

  return (
    <div className="usage-panel">
      <div className="usage-cards">
        <div className="usage-card">
          <div className="label">总 Token</div>
          <div className="value">{fmtNum(total.total_tokens)}</div>
        </div>
        <div className="usage-card">
          <div className="label">输入 Token</div>
          <div className="value">{fmtNum(total.prompt_tokens)}</div>
        </div>
        <div className="usage-card">
          <div className="label">输出 Token</div>
          <div className="value">{fmtNum(total.completion_tokens)}</div>
        </div>
      </div>
      <table className="usage-table">
        <thead>
          <tr>
            <th>会话</th>
            <th>总 Token</th>
            <th>输入</th>
            <th>输出</th>
          </tr>
        </thead>
        <tbody>
          {sessions.map(s => (
            <tr key={s.session_id}>
              <td>{s.session_id}</td>
              <td>{fmtNum(s.total_tokens)}</td>
              <td>{fmtNum(s.prompt_tokens)}</td>
              <td>{fmtNum(s.completion_tokens)}</td>
            </tr>
          ))}
          {sessions.length === 0 && <tr><td colSpan="4" style={{textAlign:"center",color:"#9ca3af"}}>暂无 token 数据</td></tr>}
        </tbody>
      </table>
    </div>
  );
}

// ── Memory Tab ──
function MemoryView() {
  const [knowledge, setKnowledge] = useState("");
  const [context, setContext] = useState("");
  const [knowledgeDirty, setKnowledgeDirty] = useState(false);
  const [contextDirty, setContextDirty] = useState(false);

  useEffect(() => {
    api("/api/memory/knowledge").then(d => setKnowledge(d.content)).catch(()=>{});
    api("/api/memory/context").then(d => setContext(d.content)).catch(()=>{});
  }, []);

  const saveKnowledge = async () => {
    await api("/api/memory/knowledge", { method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify({content: knowledge}) });
    setKnowledgeDirty(false);
    toast("知识库已保存");
  };

  const saveContext = async () => {
    await api("/api/memory/context", { method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify({content: context}) });
    setContextDirty(false);
    toast("上下文已保存");
  };

  const handleKeyDown = (saveFn, setDirty) => e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); saveFn(); }
  };

  return (
    <div className="memory-panel">
      <div className="memory-col">
        <h3>
          📚 长期记忆 / memory.md
          <button onClick={saveKnowledge} disabled={!knowledgeDirty} style={knowledgeDirty ? {} : {opacity:.5}}>保存</button>
        </h3>
        <textarea
          value={knowledge}
          onChange={e => { setKnowledge(e.target.value); setKnowledgeDirty(true); }}
          onKeyDown={handleKeyDown(saveKnowledge, setKnowledgeDirty)}
          placeholder="暂无长期记忆..."
          spellCheck={false}
        />
      </div>
      <div className="memory-col">
        <h3>
          📋 近期摘要 / current_context.md
          <button onClick={saveContext} disabled={!contextDirty} style={contextDirty ? {} : {opacity:.5}}>保存</button>
        </h3>
        <textarea
          value={context}
          onChange={e => { setContext(e.target.value); setContextDirty(true); }}
          onKeyDown={handleKeyDown(saveContext, setContextDirty)}
          placeholder="暂无近期摘要..."
          spellCheck={false}
        />
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [tab, setTab] = useState("sessions");

  return (
    <div id="root">
      <div className="header">
        <h1>⚡ MMSG Dashboard</h1>
        <div className="tabs">
          <button className={`tab${tab==="sessions"?" active":""}`} onClick={()=>setTab("sessions")}>💬 Sessions</button>
          <button className={`tab${tab==="usage"?" active":""}`} onClick={()=>setTab("usage")}>📊 Usage</button>
          <button className={`tab${tab==="memory"?" active":""}`} onClick={()=>setTab("memory")}>🧠 Memory</button>
        </div>
      </div>
      {tab === "sessions" ? <SessionsView /> : tab === "usage" ? <UsageView /> : <MemoryView />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
