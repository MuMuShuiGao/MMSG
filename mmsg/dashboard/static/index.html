<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MMSG Dashboard</title>
<script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.16.0/babel.min.js"></script>
<style>
:root {
  --brand: #4f46e5;
  --brand-2: #7c3aed;
  --brand-grad: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%);
  --ring: rgba(79, 70, 229, .18);
}
* { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: rgba(124, 58, 237, .25) transparent; }
@keyframes bgshift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInL { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: translateX(0); } }
@keyframes bubbleIn { from { opacity: 0; transform: translateY(8px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes pop { 0% { transform: scale(.85); opacity: 0; } 60% { transform: scale(1.04); } 100% { transform: scale(1); opacity: 1; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: #1e293b; min-height: 100vh;
  background: linear-gradient(120deg, #eef2ff 0%, #f5f3ff 35%, #fdf2f8 70%, #eff6ff 100%);
  background-size: 300% 300%;
  animation: bgshift 24s ease infinite;
}
#root { display: flex; flex-direction: column; height: 100vh; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, .25); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(124, 58, 237, .45); background-clip: padding-box; }

.header {
  background: rgba(255, 255, 255, .7); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  padding: 14px 24px; display: flex; align-items: center; gap: 28px;
  border-bottom: 1px solid rgba(148, 163, 184, .18);
  box-shadow: 0 4px 24px rgba(79, 70, 229, .06);
  animation: fadeUp .5s ease both;
  flex-wrap: wrap;
}
.header h1 {
  font-size: 19px; white-space: nowrap; font-weight: 800; letter-spacing: -.02em;
  background: var(--brand-grad); -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: floaty 4s ease-in-out infinite;
  will-change: transform;
}
.tabs { display: flex; gap: 8px; }
.tab {
  padding: 8px 18px; border-radius: 10px; border: 1px solid rgba(148, 163, 184, .3);
  background: rgba(255, 255, 255, .6); color: #475569; cursor: pointer; font-size: 13px; font-weight: 600;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s, color .18s, border-color .18s, background .18s;
}
.tab:hover { border-color: var(--brand); color: var(--brand); transform: translateY(-2px); box-shadow: 0 6px 16px var(--ring); }
.tab.active { background: var(--brand-grad); border-color: transparent; color: #fff; box-shadow: 0 8px 20px rgba(124, 58, 237, .32); transform: translateY(-1px); }

.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 288px; min-width: 288px; display: flex; flex-direction: column;
  background: rgba(255, 255, 255, .55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-right: 1px solid rgba(148, 163, 184, .18);
  animation: slideInL .5s ease both;
}
.sidebar-header { padding: 14px; border-bottom: 1px solid rgba(148, 163, 184, .15); }
.sidebar-header input { width: 100%; padding: 9px 13px; border-radius: 10px; border: 1px solid rgba(148, 163, 184, .35); background: rgba(255,255,255,.8); color: #1e293b; font-size: 13px; outline: none; transition: border-color .2s, box-shadow .2s; }
.sidebar-header input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--ring); }
.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item {
  padding: 11px 13px; border-radius: 11px; cursor: pointer; font-size: 13px;
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  margin-bottom: 4px; color: #334155; position: relative; overflow: hidden;
  border: 1px solid transparent;
  transition: transform .16s ease, box-shadow .2s ease, background .2s, border-color .2s;
  animation: fadeUp .35s ease both;
}
.session-item:hover { background: rgba(255,255,255,.85); transform: translateX(3px); box-shadow: 0 4px 14px rgba(79,70,229,.08); }
.session-item.selected { background: linear-gradient(135deg, rgba(79,70,229,.1), rgba(124,58,237,.08)); color: #4338ca; border-color: rgba(124,58,237,.25); box-shadow: 0 4px 16px rgba(124,58,237,.12); }
.session-item.selected::before { content: ""; position: absolute; left: 0; top: 10%; bottom: 10%; width: 3px; border-radius: 3px; background: var(--brand-grad); }
.session-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.session-item .time-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.session-item .ts { font-size: 11px; color: #94a3b8; white-space: nowrap; }
.session-item .del-btn { visibility: hidden; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 0 4px; flex-shrink: 0; border-radius: 6px; transition: transform .15s, background .15s; }
.session-item .del-btn:hover { transform: scale(1.25); background: rgba(239,68,68,.1); }
.session-item:hover .del-btn { visibility: visible; }

.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.content-header {
  padding: 14px 22px; border-bottom: 1px solid rgba(148, 163, 184, .15);
  display: flex; align-items: center; gap: 12px;
  background: rgba(255, 255, 255, .55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  animation: fadeUp .4s ease both;
}
.content-header input { flex: 1; padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(148,163,184,.35); background: rgba(255,255,255,.85); color: #1e293b; font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s; }
.content-header input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--ring); }
.content-header button { padding: 8px 18px; border-radius: 10px; border: none; background: var(--brand-grad); color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; transition: transform .15s, box-shadow .2s; }
.content-header button:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(124,58,237,.3); }

.msg-list { flex: 1; overflow-y: auto; padding: 20px 26px; }
.msg { margin-bottom: 18px; max-width: 85%; animation: bubbleIn .4s cubic-bezier(.34,1.2,.64,1) both; }
.msg.user { margin-left: auto; }
.msg.user .bubble { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border-radius: 16px 16px 4px 16px; border: none; box-shadow: 0 6px 18px rgba(99,72,229,.25); }
.msg.assistant .bubble { background: rgba(255,255,255,.85); color: #1e293b; border-radius: 16px 16px 16px 4px; border: 1px solid rgba(148,163,184,.18); box-shadow: 0 4px 16px rgba(15, 23, 42, .06); }
.msg.system .bubble { background: linear-gradient(135deg, #fef9c3, #fef08a); color: #713f12; border-radius: 14px; border: 1px solid #fde68a; font-size: 12px; }
.msg.tool .bubble { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; border-radius: 14px; border: 1px solid #6ee7b7; font-size: 12px; font-family: "Fira Code", "Cascadia Code", Consolas, Monaco, "SF Mono", monospace; }
.tool-call-card { background: rgba(255,255,255,.82); backdrop-filter: blur(8px); border: 1px solid rgba(148,163,184,.2); border-left: 3px solid #8b5cf6; border-radius: 12px; padding: 11px 14px; margin-bottom: 8px; animation: fadeUp .3s ease both; }
.tool-call-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.tool-call-name { font-size: 13px; font-weight: 700; color: #7c3aed; font-family: "Fira Code", "Cascadia Code", Consolas, Monaco, "SF Mono", monospace; }
.tool-call-badge { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: linear-gradient(135deg, #ede9fe, #ddd6fe); color: #6d28d9; font-weight: 700; }
.tool-call-args { font-size: 12px; color: #64748b; font-family: "Fira Code", "Cascadia Code", Consolas, Monaco, "SF Mono", monospace; background: rgba(124,58,237,.04); border-radius: 8px; padding: 8px 10px; overflow-x: auto; max-height: 280px; line-height: 1.6; }
.tool-result-box { font-size: 12px; font-family: "Fira Code", "Cascadia Code", Consolas, Monaco, "SF Mono", monospace; margin-top: 8px; padding: 8px 10px; border-radius: 8px; border: 1px dashed #6ee7b7; background: rgba(16,185,129,.05); color: #065f46; overflow-x: auto; max-height: 280px; line-height: 1.6; }
.tool-result-label { font-size: 11px; color: #059669; font-weight: 600; margin-top: 10px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.tool-card-compact { background: rgba(255,255,255,.7); border: 1px solid rgba(148,163,184,.18); border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; animation: fadeUp .3s ease both; }
.bubble { padding: 11px 15px; line-height: 1.55; font-size: 14px; white-space: pre-wrap; word-break: break-word; transition: transform .18s ease, box-shadow .2s ease; }
.bubble:hover { transform: translateY(-1px); }
.msg .role-label { font-size: 11px; color: #64748b; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
.msg .msg-id { font-size: 10px; color: #94a3b8; }

.usage-panel { flex: 1; padding: 22px; overflow: auto; animation: fadeUp .45s ease both; }
.usage-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 20px; }
.usage-card {
  background: rgba(255,255,255,.7); backdrop-filter: blur(8px); border: 1px solid rgba(148,163,184,.18);
  border-radius: 16px; padding: 20px; box-shadow: 0 6px 20px rgba(79,70,229,.07);
  position: relative; overflow: hidden;
  transition: transform .2s cubic-bezier(.34,1.4,.64,1), box-shadow .25s;
  animation: pop .45s ease both;
}
.usage-card:nth-child(2) { animation-delay: .08s; }
.usage-card:nth-child(3) { animation-delay: .16s; }
.usage-card::after { content: ""; position: absolute; inset: 0; border-radius: 16px; padding: 1px; background: var(--brand-grad); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity .25s; }
.usage-card:hover { transform: translateY(-5px); box-shadow: 0 14px 32px rgba(124,58,237,.16); }
.usage-card:hover::after { opacity: 1; }
.usage-card .label { font-size: 12px; color: #64748b; margin-bottom: 10px; font-weight: 600; letter-spacing: .03em; }
.usage-card .value { font-size: 28px; font-weight: 800; background: var(--brand-grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
.usage-table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,.7); backdrop-filter: blur(8px); border: 1px solid rgba(148,163,184,.18); border-radius: 16px; overflow: hidden; box-shadow: 0 6px 20px rgba(79,70,229,.07); }
.usage-table th, .usage-table td { padding: 12px 14px; border-bottom: 1px solid rgba(148,163,184,.14); text-align: left; font-size: 13px; }
.usage-table.num-table th, .usage-table.num-table td { text-align: right; }
.usage-table.num-table th:first-child, .usage-table.num-table td:first-child { text-align: left; }
.usage-table th { background: rgba(238,242,255,.6); color: #475569; font-weight: 700; }
.usage-table tbody tr { transition: background .15s; }
.usage-table tbody tr:hover { background: rgba(124,58,237,.05); }
.usage-table tr:last-child td { border-bottom: none; }

.memory-panel { flex: 1; display: flex; gap: 18px; padding: 22px; overflow: hidden; animation: fadeUp .45s ease both; }
.memory-col { flex: 1; display: flex; flex-direction: column; background: rgba(255,255,255,.7); backdrop-filter: blur(8px); border: 1px solid rgba(148,163,184,.18); border-radius: 16px; padding: 16px; box-shadow: 0 6px 20px rgba(79,70,229,.07); transition: box-shadow .25s; }
.memory-col:hover { box-shadow: 0 12px 30px rgba(124,58,237,.12); }
.memory-col h3 { margin-bottom: 12px; font-size: 14px; color: #1e293b; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
.memory-col h3 button { padding: 6px 14px; border-radius: 9px; border: none; background: var(--brand-grad); color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; transition: transform .15s, box-shadow .2s, opacity .2s; }
.memory-col h3 button:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(124,58,237,.3); }
.memory-col textarea { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid rgba(148,163,184,.3); background: rgba(255,255,255,.85); color: #1e293b; font-size: 13px; resize: none; outline: none; font-family: "Fira Code", "Cascadia Code", Consolas, Monaco, "SF Mono", monospace; line-height: 1.65; transition: border-color .2s, box-shadow .2s; }
.memory-col textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 4px var(--ring); }

@media (max-width: 768px) {
  .memory-panel { flex-direction: column; overflow-y: auto; }
  .memory-col { min-height: 300px; }
}

.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 14px; animation: floaty 4s ease-in-out infinite; }

.saved-toast { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; padding: 12px 22px; border-radius: 12px; font-size: 13px; font-weight: 600; opacity: 0; transform: translateY(12px) scale(.95); transition: opacity .3s, transform .3s cubic-bezier(.34,1.56,.64,1); z-index: 999; box-shadow: 0 10px 28px rgba(22, 163, 74, .3); pointer-events: none; }
.saved-toast.show { opacity: 1; transform: translateY(0) scale(1); }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="saved-toast">✓ 已保存</div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── helpers ──
const api = (url, opts) => fetch(url, opts).then(r => r.ok ? r.json() : Promise.reject(r));
const fmtTs = ts => ts ? new Date(ts).toLocaleString("zh-CN", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
const fmtTsFull = ts => ts ? new Date(ts).toLocaleString("zh-CN", {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "";
const fmtNum = n => Number(n || 0).toLocaleString("zh-CN");
const usageOf = m => (m.meta && m.meta.usage) || {};
const usageText = usage => {
  const total = usage.total_tokens;
  if (total == null) return "";
  return `token ${fmtNum(total)} (in ${fmtNum(usage.prompt_tokens)}, out ${fmtNum(usage.completion_tokens)})`;
};
const toast = msg => { const e = document.getElementById("toast"); e.textContent = msg; e.classList.add("show"); setTimeout(() => e.classList.remove("show"), 1500); };

// ── Tool Call helpers ──
const getToolCallsFromMeta = m => {
  const meta = (m.meta && typeof m.meta === "object") ? m.meta : {};
  const raw = meta.tool_calls;
  if (!raw || !Array.isArray(raw)) return [];
  return raw.map(tc => ({
    id: tc.id || "",
    name: tc.name || "",
    arguments: typeof tc.arguments === "string" ? tryParse(tc.arguments) : tc.arguments,
  })).filter(t => t.name);
};
const tryParse = s => { try { return JSON.parse(s); } catch { return { _raw: s }; } };
const fmtArgs = args => {
  if (!args) return "{}";
  try { return JSON.stringify(args, null, 2); } catch { return String(args); }
};
const truncateResult = (s, max = 400) => {
  if (!s) return "(空结果)";
  if (s.length > max) return s.slice(0, max) + "…";
  return s;
};
const renderToolCallCard = (tc, resultText, idx) => (
  <div key={`tc_${tc.id}_${idx}`} className="tool-call-card">
    <div className="tool-call-header">
      <span className="tool-call-name">⚙ {tc.name}</span>
      <span className="tool-call-badge">Tool Call</span>
    </div>
    <pre className="tool-call-args">{fmtArgs(tc.arguments)}</pre>
    {resultText && <div>
      <div className="tool-result-label">↓ 返回结果</div>
      <pre className="tool-result-box">{truncateResult(resultText)}</pre>
    </div>}
  </div>
);

// ── Sessions Tab ──
function SessionsView() {
  const [sessions, setSessions] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [search, setSearch] = useState("");
  const [titleEdit, setTitleEdit] = useState(null);
  const [editTitleVal, setEditTitleVal] = useState("");
  const [genLoading, setGenLoading] = useState(false);

  useEffect(() => { api("/api/sessions").then(setSessions).catch(() => {}); }, []);

  const selectSession = id => {
    setSelectedId(id);
    api(`/api/sessions/${id}/messages`).then(setMessages).catch(() => setMessages([]));
  };

  const delSession = async (id) => {
    if (!confirm("确定删除此会话？")) return;
    await api(`/api/sessions/${id}`, { method: "DELETE" });
    setSessions(prev => prev.filter(s => s.id !== id));
    if (selectedId === id) { setSelectedId(null); setMessages([]); }
    toast("会话已删除");
  };

  const saveTitle = async (id, title) => {
    await api(`/api/sessions/${id}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({title}) });
    setSessions(prev => prev.map(s => s.id === id ? {...s, title} : s));
    setTitleEdit(null);
    toast("标题已保存");
  };

  const filtered = sessions.filter(s => {
    if (!search) return true;
    const q = search.toLowerCase();
    return (s.title||"").toLowerCase().includes(q) || (s.id||"").toLowerCase().includes(q);
  });

  return (
    <div className="main">
      <div className="sidebar">
        <div className="sidebar-header">
          <input placeholder="搜索会话..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div className="session-list">
          {filtered.map(s => (
            <div key={s.id} className={`session-item${selectedId === s.id ? " selected" : ""}`} onClick={() => selectSession(s.id)}>
              <span className="title" title={s.title || s.id}>
                {s.title || s.source || s.id}
              </span>
              <div className="time-info" title={`来源：${s.source||""}\n创建：${new Date(s.created_at).toLocaleString("zh-CN")}\n最新：${new Date(s.updated_at).toLocaleString("zh-CN")}`}>
                {s.source && <span className="ts">{s.source}</span>}
                <span className="ts">创建 {fmtTs(s.created_at)}</span>
                <span className="ts">最新 {fmtTs(s.updated_at)}</span>
              </div>
              <button className="del-btn" onClick={e => { e.stopPropagation(); delSession(s.id); }} title="删除">✕</button>
            </div>
          ))}
          {filtered.length === 0 && <div style={{padding:16,color:"#555",fontSize:13}}>暂无会话</div>}
        </div>
      </div>
      <div className="content">
        {selectedId ? (
          <>
            <div className="content-header">
              {titleEdit === selectedId ? (
                <>
                  <input autoFocus value={editTitleVal} onChange={e => setEditTitleVal(e.target.value)} onKeyDown={e => { if (e.key==="Enter") saveTitle(selectedId, editTitleVal); if (e.key==="Escape") setTitleEdit(null); }} />
                  <button onClick={() => saveTitle(selectedId, editTitleVal)}>保存</button>
                  <button style={{background:"#333"}} onClick={() => setTitleEdit(null)}>取消</button>
                </>
              ) : (
                <>
                  <strong style={{cursor:"pointer"}} onClick={() => { setTitleEdit(selectedId); setEditTitleVal(sessions.find(s=>s.id===selectedId)?.title || ""); }} title="点击编辑标题">
                    {sessions.find(s=>s.id===selectedId)?.title || selectedId} ▾
                  </strong>
                  <span style={{fontSize:11,color:"#555"}}>({messages.length} 条消息)</span>
                  <span style={{fontSize:11,color:"#6b7280"}}>创建：{fmtTs(sessions.find(s=>s.id===selectedId)?.created_at)}</span>
                  <span style={{fontSize:11,color:"#6b7280"}}>最新：{fmtTs(sessions.find(s=>s.id===selectedId)?.updated_at)}</span>
                  <button
                    disabled={genLoading}
                    onClick={async () => {
                      setGenLoading(true);
                      try {
                        const r = await api(`/api/curiosity/trigger-curiosity/${selectedId}`, { method: "POST" });
                        toast(`已生成 ${r.generated} 条 curiosity note`);
                      } catch(e) { toast("生成失败，查看后台日志"); }
                      finally { setGenLoading(false); }
                    }}
                    style={{marginLeft:"auto",padding:"7px 16px",borderRadius:10,border:"none",
                      background: genLoading ? "#94a3b8" : "linear-gradient(135deg, #f59e0b, #d97706)", color:"#fff",
                      cursor: genLoading ? "wait" : "pointer", fontSize:12, fontWeight:600,
                      boxShadow: genLoading ? "none" : "0 2px 8px rgba(245,158,11,.25)",
                      transition: "all .2s cubic-bezier(.34,1.4,.64,1)"}}
                    title="Dashboard: 基于当前会话生成 curiosity notes"
                  >{genLoading ? "生成中..." : "生成 Notes"}</button>
                </>
              )}
            </div>
            <div className="msg-list">
              {(() => {
                // Group assistant + tool messages: build list of {kind, messages[]}
                const groups = [];
                messages.forEach((m, i) => {
                  if (m.role === "user" || m.role === "system") {
                    groups.push({ kind: m.role, messages: [m] });
                  } else if (m.role === "assistant") {
                    const tcs = getToolCallsFromMeta(m);
                    if (tcs.length > 0) {
                      // Look ahead for tool result messages (role=tool) belonging to this assistant turn
                      const toolResults = {};
                      for (let j = i + 1; j < messages.length; j++) {
                        if (messages[j].role === "tool") {
                          toolResults[messages[j].meta?.tool_call_id || ""] = messages[j].content;
                        } else break;
                      }
                      groups.push({ kind: "assistant_tool", messages: [m], toolCalls: tcs, toolResults });
                    } else {
                      groups.push({ kind: "assistant", messages: [m] });
                    }
                  } else if (m.role === "tool") {
                    // Already handled above in assistant_tool group; skip if already consumed
                    const prevGroup = groups.length > 0 ? groups[groups.length - 1] : null;
                    if (prevGroup && prevGroup.kind === "assistant_tool" && prevGroup.toolResults[m.meta?.tool_call_id || ""]) {
                      // skip: already embedded
                    } else {
                      groups.push({ kind: "tool", messages: [m] });
                    }
                  }
                });
                return groups.map((g, gi) => {
                  if (g.kind === "user") return (
                    <div key={gi} className="msg user">
                      <div className="role-label"><span>{g.messages[0].role}</span></div>
                      <div className="bubble">{g.messages[0].content}</div>
                    </div>
                  );
                  if (g.kind === "system") return (
                    <div key={gi} className="msg system">
                      <div className="bubble">{g.messages.map(m => m.content).join("\n")}</div>
                    </div>
                  );
                  if (g.kind === "assistant") return (
                    <div key={gi} className="msg assistant">
                      <div className="role-label"><span>assistant</span>{usageText(usageOf(g.messages[0])) && <span className="msg-id">{usageText(usageOf(g.messages[0]))}</span>}</div>
                      <div className="bubble">{g.messages.map(m => m.content).filter(Boolean).join("\n") || "(无文本)"}</div>
                    </div>
                  );
                  if (g.kind === "assistant_tool") return (
                    <div key={gi} className="msg assistant">
                      <div className="role-label"><span>assistant</span>{usageText(usageOf(g.messages[0])) && <span className="msg-id">{usageText(usageOf(g.messages[0]))}</span>}</div>
                      {g.messages[0].content && <div className="bubble" style={{marginBottom:10}}>{g.messages[0].content}</div>}
                      {g.toolCalls.map((tc, ci) =>
                        renderToolCallCard(tc, g.toolResults[tc.id] || null, ci)
                      )}
                    </div>
                  );
                  if (g.kind === "tool") return (
                    <div key={gi} className="msg tool">
                      <div className="role-label"><span>{g.messages[0].meta?.name || "tool"}</span></div>
                      <div className="bubble">{g.messages[0].content}</div>
                    </div>
                  );
                  return null;
                });
              })()}
            </div>
          </>
        ) : (
          <div className="empty-state">← 从左侧选择一个会话</div>
        )}
      </div>
    </div>
  );
}

// ── Memory Tab ──
function MemoryView() {
  const [knowledge, setKnowledge] = useState("");
  const [context, setContext] = useState("");
  const [knowledgeDirty, setKnowledgeDirty] = useState(false);
  const [contextDirty, setContextDirty] = useState(false);
  const [curatorState, setCuratorState] = useState(null);
  const [workersState, setWorkersState] = useState(null);
  const [refreshing, setRefreshing] = useState(false);

  const loadAll = useCallback(async () => {
    setRefreshing(true);
    try {
      const [k, c, cur, wrk] = await Promise.all([
        api("/api/memory/knowledge").catch(() => ({content:""})),
        api("/api/memory/context").catch(() => ({content:""})),
        api("/api/memory/state").catch(() => null),
        api("/api/memory/workers-state").catch(() => null),
      ]);
      if (!knowledgeDirty) setKnowledge(k.content);
      if (!contextDirty) setContext(c.content);
      setCuratorState(cur);
      setWorkersState(wrk);
    } catch(e) {}
    finally { setRefreshing(false); }
  }, [knowledgeDirty, contextDirty]);

  useEffect(() => { loadAll(); }, []);

  const saveKnowledge = async () => {
    await api("/api/memory/knowledge", { method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify({content: knowledge}) });
    setKnowledgeDirty(false);
    toast("知识库已保存");
  };

  const saveContext = async () => {
    await api("/api/memory/context", { method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify({content: context}) });
    setContextDirty(false);
    toast("上下文已保存");
  };

  const handleKeyDown = (saveFn, setDirty) => e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); saveFn(); }
  };

  const buildCard = (label, lines) => (
    <div className="usage-card">
      <div className="label">{label}</div>
      <div style={{fontSize:13,lineHeight:1.8,color:"#475569"}}>
        {lines.map((l,i) => <div key={i}>{l}</div>)}
      </div>
    </div>
  );

  const cur = curatorState || {};
  const con = (workersState && workersState.consolidator) || {};
  const mer = (workersState && workersState.merger) || {};

  return (
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
      <div style={{padding:"22px 22px 0 22px",display:"flex",alignItems:"center",gap:12}}>
        <h3 style={{color:"#1e293b",fontSize:15,fontWeight:700,margin:0}}>后台 Worker 状态</h3>
        <button
          disabled={refreshing}
          onClick={loadAll}
          style={{padding:"6px 14px",borderRadius:9,border:"none",
            background: refreshing ? "#94a3b8" : "var(--brand-grad)", color:"#fff",
            cursor: refreshing ? "wait" : "pointer", fontSize:12, fontWeight:600,
            transition: "all .2s cubic-bezier(.34,1.4,.64,1)"}}
        >{refreshing ? "刷新中..." : "刷新"}</button>
      </div>
      <div className="usage-cards" style={{padding:"12px 22px 0 22px"}}>
        {buildCard("🧠 长期策展", [
          `最后处理 ID: ${cur.last_curated_id ?? "—"}`,
          `重试次数: ${cur.retry_count ?? 0}`,
          `上次运行: ${cur.last_run_at ? fmtTs(cur.last_run_at) : "—"}`,
        ])}
        {buildCard("📝 事实提取", [
          `最后处理 ID: ${con.last_consolidated_id ?? "—"}`,
          `重试次数: ${con.retry_count ?? 0}`,
          `上次运行: ${con.last_run_at ? fmtTs(con.last_run_at) : "—"}`,
        ])}
        {buildCard("🔗 事实合并", [
          `上次运行: ${mer.last_merge_at ? fmtTs(mer.last_merge_at) : "—"}`,
        ])}
      </div>
      <div className="memory-panel" style={{flex:1}}>
        <div className="memory-col">
          <h3>
            📚 长期记忆 / memory.md
            <button onClick={saveKnowledge} disabled={!knowledgeDirty} style={knowledgeDirty ? {} : {opacity:.5}}>保存</button>
          </h3>
          <textarea
            value={knowledge}
            onChange={e => { setKnowledge(e.target.value); setKnowledgeDirty(true); }}
            onKeyDown={handleKeyDown(saveKnowledge, setKnowledgeDirty)}
            placeholder="暂无长期记忆..."
            spellCheck={false}
          />
        </div>
        <div className="memory-col">
          <h3>
            📋 近期摘要 / current_context.md
            <button onClick={saveContext} disabled={!contextDirty} style={contextDirty ? {} : {opacity:.5}}>保存</button>
          </h3>
          <textarea
            value={context}
            onChange={e => { setContext(e.target.value); setContextDirty(true); }}
            onKeyDown={handleKeyDown(saveContext, setContextDirty)}
            placeholder="暂无近期摘要..."
            spellCheck={false}
          />
        </div>
      </div>
    </div>
  );
}

// ── Messages Tab ──
function MessagesView() {
  const PAGE = 100;
  const [data, setData] = useState({rows:[], total:0});
  const [offset, setOffset] = useState(0);
  const [expandedId, setExpandedId] = useState(null);
  const [roleFilter, setRoleFilter] = useState("");
  const [search, setSearch] = useState("");
  const [searchInput, setSearchInput] = useState("");

  const load = (o, role, q) => {
    let url = `/api/messages?offset=${o}&limit=${PAGE}`;
    if (role) url += `&role=${role}`;
    if (q) url += `&q=${encodeURIComponent(q)}`;
    api(url).then(setData).catch(() => {});
  };

  useEffect(() => { load(0, roleFilter, search); }, []);

  const totalPages = Math.ceil(data.total / PAGE);
  const curPage = Math.floor(offset / PAGE) + 1;

  const goPage = p => {
    const o = (p - 1) * PAGE;
    setOffset(o);
    load(o, roleFilter, search);
  };

  const applyRole = r => {
    const newRole = r === roleFilter ? "" : r;
    setRoleFilter(newRole);
    setOffset(0);
    load(0, newRole, search);
  };

  const applySearch = () => {
    setSearch(searchInput);
    setOffset(0);
    load(0, roleFilter, searchInput);
  };

  const clearSearch = () => {
    setSearchInput("");
    setSearch("");
    setOffset(0);
    load(0, roleFilter, "");
  };

  const roleBadge = role => {
    const map = { user: {bg:"#dbeafe",color:"#1d4ed8"}, assistant: {bg:"#d1fae5",color:"#065f46"}, system: {bg:"#fef3c7",color:"#92400e"}, tool: {bg:"#ede9fe",color:"#6d28d9"} };
    const s = map[role] || {bg:"#f3f4f6",color:"#6b7280"};
    return <span style={{padding:"2px 7px",borderRadius:5,fontSize:11,fontWeight:700,background:s.bg,color:s.color}}>{role}</span>;
  };

  const toolCallBadges = m => {
    const tcs = getToolCallsFromMeta(m);
    if (!tcs.length) return null;
    return tcs.map((tc, i) => (
      <span key={i} style={{marginLeft:6,padding:"2px 7px",borderRadius:5,fontSize:10,fontWeight:700,background:"linear-gradient(135deg,#ede9fe,#ddd6fe)",color:"#7c3aed",fontFamily:"'Fira Code',monospace"}}>⚙ {tc.name}</span>
    ));
  };

  const toolNameBadge = m => {
    const name = (m.meta && m.meta.name) || "";
    if (!name) return null;
    return <span style={{marginLeft:6,padding:"2px 7px",borderRadius:5,fontSize:10,fontWeight:700,background:"#d1fae5",color:"#065f46",fontFamily:"'Fira Code',monospace"}}>→ {name}</span>;
  };

  const truncated = content => {
    if (!content) return "";
    const flat = content.replace(/\n/g, " ");
    return flat.length > 80 ? flat.slice(0, 80) + "…" : flat;
  };

  const roles = ["user", "assistant", "tool", "system"];

  return (
    <div className="usage-panel">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
        <h3 style={{color:"#1e293b",fontSize:15,fontWeight:700,margin:0}}>📨 全部消息</h3>
        <span style={{fontSize:12,color:"#94a3b8"}}>共 {fmtNum(data.total)} 条</span>
      </div>
      {/* Role filter buttons */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
        {roles.map(r => (
          <button key={r} onClick={() => applyRole(r)}
            style={{padding:"4px 12px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",
              border: roleFilter===r ? "2px solid var(--brand)" : "1px solid rgba(148,163,184,.35)",
              background: roleFilter===r ? "rgba(79,70,229,.08)" : "#fff",
              color: roleFilter===r ? "var(--brand)" : "#475569",
              transition:"all .15s ease"}}>{r}</button>
        ))}
        {roleFilter && <button onClick={() => applyRole("")}
          style={{padding:"4px 10px",borderRadius:8,fontSize:11,border:"none",background:"#fee2e2",color:"#dc2626",cursor:"pointer",fontWeight:600}}>✕ 清除</button>}
      </div>
      {/* Search bar */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <input value={searchInput} onChange={e => setSearchInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") applySearch(); }}
          placeholder="搜索消息内容..."
          style={{flex:1,maxWidth:320,padding:"7px 12px",borderRadius:9,border:"1px solid rgba(148,163,184,.35)",fontSize:12,outline:"none",transition:"border .2s"}}
        />
        <button onClick={applySearch}
          style={{padding:"6px 14px",borderRadius:8,border:"none",background:"var(--brand-grad)",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>搜索</button>
        {search && <button onClick={clearSearch}
          style={{padding:"6px 10px",borderRadius:8,border:"none",background:"#fee2e2",color:"#dc2626",fontSize:11,fontWeight:600,cursor:"pointer"}}>✕</button>}
        {search && <span style={{fontSize:11,color:"#64748b"}}>关键词: "{search}"</span>}
      </div>
      {/* Pagination */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <button disabled={offset === 0} onClick={() => goPage(1)}
          style={{padding:"5px 12px",borderRadius:8,border:"1px solid rgba(148,163,184,.35)",background:"#fff",cursor: offset===0?"default":"pointer",fontSize:12,opacity:offset===0?.5:1}}>««</button>
        <button disabled={offset === 0} onClick={() => goPage(curPage - 1)}
          style={{padding:"5px 12px",borderRadius:8,border:"1px solid rgba(148,163,184,.35)",background:"#fff",cursor: offset===0?"default":"pointer",fontSize:12,opacity:offset===0?.5:1}}>‹</button>
        <span style={{fontSize:12,color:"#475569"}}>第 {curPage}/{totalPages || 1} 页</span>
        <button disabled={offset + PAGE >= data.total} onClick={() => goPage(curPage + 1)}
          style={{padding:"5px 12px",borderRadius:8,border:"1px solid rgba(148,163,184,.35)",background:"#fff",cursor: offset+PAGE>=data.total?"default":"pointer",fontSize:12,opacity:offset+PAGE>=data.total?.5:1}}>›</button>
        <button disabled={offset + PAGE >= data.total} onClick={() => goPage(totalPages)}
          style={{padding:"5px 12px",borderRadius:8,border:"1px solid rgba(148,163,184,.35)",background:"#fff",cursor: offset+PAGE>=data.total?"default":"pointer",fontSize:12,opacity:offset+PAGE>=data.total?.5:1}}>»»</button>
      </div>
      <table className="usage-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>角色</th>
            <th>内容</th>
            <th>会话</th>
            <th>时间</th>
          </tr>
        </thead>
        <tbody>
          {data.rows.map(m => (
            <tr key={m.id} style={{cursor:"pointer"}} onClick={() => setExpandedId(expandedId === m.id ? null : m.id)}>
              <td style={{fontSize:12,fontFamily:"'Fira Code',monospace",color:"#94a3b8"}}>{m.id}</td>
              <td>
                {roleBadge(m.role)}
                {m.role === "assistant" && toolCallBadges(m)}
                {m.role === "tool" && toolNameBadge(m)}
              </td>
              <td style={{fontSize:12,maxWidth: expandedId===m.id ? undefined : 360, overflow: expandedId===m.id ? "visible" : "hidden", textOverflow: expandedId===m.id ? undefined : "ellipsis", whiteSpace: expandedId===m.id ? "pre-wrap" : "nowrap", lineHeight: expandedId===m.id ? 1.7 : undefined, wordBreak: expandedId===m.id ? "break-word" : undefined, border: expandedId===m.id ? "1px solid rgba(124,58,237,.2)" : undefined, borderRadius: expandedId===m.id ? "6px" : undefined, padding: expandedId===m.id ? "8px 10px" : undefined, background: expandedId===m.id ? "rgba(124,58,237,.03)" : undefined}} title={!expandedId ? m.content : undefined}>
                {expandedId === m.id ? m.content : truncated(m.content)}
              </td>
              <td style={{fontSize:11,color:"#64748b",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={m.session_title || m.session_id}>
                {m.session_title || m.session_id || "—"}
              </td>
              <td style={{fontSize:11,color:"#94a3b8",whiteSpace:"nowrap"}}>{fmtTsFull(m.created_at)}</td>
            </tr>
          ))}
          {data.rows.length === 0 && <tr><td colSpan="5" style={{textAlign:"center",color:"#9ca3af"}}>暂无消息</td></tr>}
        </tbody>
      </table>
    </div>
  );
}

// ── Curiosity Tab ──
function CuriosityView() {
  const [notes, setNotes] = useState([]);
  const [simResult, setSimResult] = useState(null);
  const [loading, setLoading] = useState(null); // null | "consolidate" | "simulate" | "execute"
  const [actionLog, setActionLog] = useState([]); // [{ts, action, detail}]

  const load = () => api("/api/curiosity/notes").then(setNotes).catch(() => {});

  useEffect(() => { load(); }, []);

  const nowTs = () => new Date().toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit",second:"2-digit"});

  const addLog = (action, detail) => {
    setActionLog(prev => [{ts: nowTs(), action, detail}, ...prev].slice(0, 12));
  };

  const dismiss = async (id) => {
    await api(`/api/curiosity/notes/${id}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({status: "dismissed"}) });
    load();
    toast("已忽略");
  };

  const raiseQ = async (id, q) => {
    const nq = Math.min(5, q + 1);
    await api(`/api/curiosity/notes/${id}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({quality: nq}) });
    load();
  };

  const lowerQ = async (id, q) => {
    const nq = Math.max(1, q - 1);
    await api(`/api/curiosity/notes/${id}`, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({quality: nq}) });
    load();
  };

  const btnStyle = (key, bg) => ({
    padding: "8px 18px", borderRadius: 10, border: "none", color: "#fff",
    cursor: loading ? "wait" : "pointer", fontSize: 13, fontWeight: 600,
    background: loading === key ? "#94a3b8" : bg,
    transition: "all .2s cubic-bezier(.34,1.4,.64,1)",
    boxShadow: loading === key ? "none" : "0 2px 8px rgba(0,0,0,.15)",
    transform: loading === key ? "none" : "translateY(0)",
  });

  const pending = notes.filter(n => n.status === "pending");
  const pushed = notes.filter(n => n.status === "pushed");
  const dismissed = notes.filter(n => n.status === "dismissed");

  const catLabel = c => ({follow_up: "🔁 追问", concern: "💛 关心", curiosity: "💡 好奇"}[c] || c);
  const qStars = q => "★".repeat(q) + "☆".repeat(5 - q);

  const verdictMeta = v => {
    const map = {
      would_push:          { color: "#16a34a", bg: "rgba(34,197,94,.12)",   border: "#22c55e" },
      pushed:              { color: "#16a34a", bg: "rgba(34,197,94,.12)",   border: "#22c55e" },
      skip:                { color: "#64748b", bg: "rgba(148,163,184,.12)", border: "#94a3b8" },
      no_candidates:       { color: "#64748b", bg: "rgba(148,163,184,.12)", border: "#94a3b8" },
      blocked_by_quiet_hours: { color: "#f59e0b", bg: "rgba(245,158,11,.12)", border: "#f59e0b" },
      score_too_low:       { color: "#f59e0b", bg: "rgba(245,158,11,.12)", border: "#f59e0b" },
      generation_failed:   { color: "#ef4444", bg: "rgba(239,68,68,.08)",   border: "#ef4444" },
      push_failed:         { color: "#ef4444", bg: "rgba(239,68,68,.08)",   border: "#ef4444" },
      empty_message:       { color: "#f59e0b", bg: "rgba(245,158,11,.12)", border: "#f59e0b" },
    };
    return map[v] || map.skip;
  };

  const verdictLabel = v => ({
    would_push: "会推送", pushed: "已推送", skip: "跳过",
    no_candidates: "无候选", blocked_by_quiet_hours: "被安静时段阻止",
    score_too_low: "评分不足，未推送", generation_failed: "消息生成失败",
    push_failed: "推送失败", empty_message: "生成消息为空",
  }[v] || v);

  return (
    <div className="usage-panel">
      <div className="usage-cards">
        <div className="usage-card">
          <div className="label">待处理</div>
          <div className="value">{pending.length}</div>
        </div>
        <div className="usage-card">
          <div className="label">已推送（今日）</div>
          <div className="value">{pushed.filter(n => n.triggered_at && new Date(n.triggered_at).toDateString() === new Date().toDateString()).length}</div>
        </div>
        <div className="usage-card">
          <div className="label">已忽略</div>
          <div className="value">{dismissed.length}</div>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,flexWrap:"wrap"}}>
        <h3 style={{color:"#1e293b",fontSize:15,fontWeight:700,margin:0}}>全部 Notes</h3>
        <button disabled={!!loading} onClick={async () => {
          setLoading("consolidate");
          addLog("立即整理", "正在调用 LLM 筛选 pending notes...");
          try {
            const r = await api("/api/curiosity/review-notes", { method: "POST" });
            addLog("立即整理", `完成 - ${r.count} 条 pending 候选`);
            toast(`整理完成，${r.count} 条 pending 候选`);
            load();
          } catch(e) { addLog("立即整理", "失败"); toast("整理失败"); }
          finally { setLoading(null); }
        }} style={btnStyle("consolidate", "#4f46e5")}
          title="Dashboard: 立即运行 LLM 整理筛选 pending notes">{loading === "consolidate" ? "整理中..." : "立即整理"}</button>
        <button disabled={!!loading} onClick={async () => {
          setLoading("simulate");
          addLog("模拟推送", "正在整理 -> 决策 -> 生成预览...");
          try {
            const r = await api("/api/curiosity/simulate-push", { method: "POST" });
            setSimResult(r);
            addLog("模拟推送", `结果: ${verdictLabel(r.verdict)}`);
            toast(`模拟完成: ${verdictLabel(r.verdict)}`);
            load();
          } catch(e) { addLog("模拟推送", "失败"); toast("模拟失败"); }
          finally { setLoading(null); }
        }} style={btnStyle("simulate", "#db2777")}
          title="Dashboard: 模拟完整推送流程，不实际发送消息">{loading === "simulate" ? "分析中..." : "模拟推送"}</button>
        <button disabled={!!loading} onClick={async () => {
          if (!confirm("确定要执行真实推送吗？消息将发送到 channel。")) return;
          setLoading("execute");
          addLog("执行推送", "正在整理 -> 决策 -> 推送...");
          try {
            const r = await api("/api/curiosity/execute-push", { method: "POST" });
            setSimResult(r);
            addLog("执行推送", `结果: ${verdictLabel(r.verdict)}`);
            toast(`${verdictLabel(r.verdict)}`);
            load();
          } catch(e) { addLog("执行推送", "失败"); toast("推送失败"); }
          finally { setLoading(null); }
        }} style={btnStyle("execute", "#16a34a")}
          title="Dashboard: 执行真实推送，消息将发送到 channel">{loading === "execute" ? "推送中..." : "执行推送"}</button>
      </div>
      {simResult && (() => {
        const vm = verdictMeta(simResult.verdict);
        return (
        <div style={{marginBottom:16,padding:16,borderRadius:12,background:vm.bg,border:`1px solid ${vm.border}`,animation:"bubbleIn .35s cubic-bezier(.34,1.2,.64,1) both"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <strong style={{fontSize:15,color:vm.color}}>{verdictLabel(simResult.verdict)}</strong>
            <span style={{fontSize:11,color:"#94a3b8",marginLeft:"auto"}}>{nowTs()}</span>
            {simResult.quiet_hours && <span style={{fontSize:12,color:"#f59e0b"}}>[安静时段]</span>}
          </div>
          {simResult.best && (
            <div style={{fontSize:13,color:"#334155",lineHeight:1.8}}>
              <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:4}}>
                <span><strong>静默时长：</strong>{simResult.hours_since_active}h</span>
                <span><strong>今日已推：</strong>{simResult.pushed_today}次</span>
                <span><strong>整理候选：</strong>{simResult.consolidated || 0}条</span>
              </div>
              {simResult.best.score_breakdown?.formula && (
                <div><strong>评分公式：</strong><code style={{fontSize:12,background:"rgba(0,0,0,.06)",padding:"1px 6px",borderRadius:4}}>{simResult.best.score_breakdown.formula}</code> = <strong>{simResult.best.score_breakdown.final}</strong>（{'＞'}0 则推）</div>
              )}
              <div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:"rgba(255,255,255,.7)"}}>
                <strong>候选内容：</strong>{simResult.best.content}
              </div>
              {simResult.best.message_preview && (
                <div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:"rgba(79,70,229,.08)",color:"#4338ca"}}>
                  <strong>推送预览：</strong>{simResult.best.message_preview}
                </div>
              )}
              {simResult.best.message_sent && (
                <div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:"rgba(22,163,74,.1)",color:"#16a34a"}}>
                  <strong>已发送：</strong>{simResult.best.message_sent}
                </div>
              )}
              {simResult.candidates && simResult.candidates.length > 1 && (
                <details style={{marginTop:8}}>
                  <summary style={{cursor:"pointer",color:"#64748b",fontSize:12}}>其他 {simResult.candidates.length - 1} 条候选</summary>
                  {simResult.candidates.slice(1).map((c,i) => (
                    <div key={i} style={{fontSize:12,color:"#64748b",padding:"4px 0"}}>
                      [{c._score}] {c.content}
                    </div>
                  ))}
                </details>
              )}
            </div>
          )}
        </div>
        );
      })()}
      {actionLog.length > 0 && (
        <details style={{marginBottom:16}} open>
          <summary style={{cursor:"pointer",fontSize:13,fontWeight:600,color:"#475569",marginBottom:8}}>
            Dashboard 操作记录
            <button onClick={() => setActionLog([])} style={{marginLeft:10,background:"none",border:"1px solid #e2e8f0",borderRadius:6,fontSize:11,color:"#94a3b8",cursor:"pointer",padding:"2px 8px"}}>清空</button>
          </summary>
          <div style={{maxHeight:180,overflowY:"auto",fontSize:12,fontFamily:"'Fira Code','Cascadia Code',monospace",background:"rgba(255,255,255,.6)",borderRadius:10,border:"1px solid rgba(148,163,184,.15)",padding:"8px 12px"}}>
            {actionLog.map((e, i) => (
              <div key={i} style={{padding:"3px 0",display:"flex",gap:10,borderBottom:i<actionLog.length-1?"1px solid rgba(148,163,184,.08)":"none"}}>
                <span style={{color:"#94a3b8",flexShrink:0}}>{e.ts}</span>
                <span style={{color:"#334155",flexShrink:0,minWidth:100}}>{e.action}</span>
                <span style={{color:"#64748b"}}>{e.detail}</span>
              </div>
            ))}
          </div>
        </details>
      )}
      <table className="usage-table">
        <thead>
          <tr>
            <th>内容</th>
            <th>分类</th>
            <th>质量</th>
            <th>状态</th>
            <th>更新时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          {notes.map(n => (
            <tr key={n.id} style={n.status === "dismissed" ? {opacity: .5} : {}}>
              <td style={{maxWidth: 360, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"}} title={n.content}>
                {n.content}
              </td>
              <td style={{fontSize:12}}>{catLabel(n.category)}</td>
              <td style={{fontSize:12, color:"#f59e0b"}}>{qStars(n.quality)}</td>
              <td style={{fontSize:12}}>
                <span style={{padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:600,
                  background: n.status==="pending"?"#dbeafe":n.status==="pushed"?"#d1fae5":"#f3f4f6",
                  color: n.status==="pending"?"#1d4ed8":n.status==="pushed"?"#065f46":"#6b7280"
                }}>{n.status}</span>
              </td>
              <td style={{fontSize:11,color:"#94a3b8"}}>{fmtTs(n.updated_at)}</td>
              <td style={{fontSize:12}}>
                {n.status === "pending" && (
                  <>
                    <button onClick={() => raiseQ(n.id, n.quality)} title="提升优先级" style={{background:"none",border:"none",cursor:"pointer",fontSize:14,marginRight:4}}>⬆</button>
                    <button onClick={() => lowerQ(n.id, n.quality)} title="降低优先级" style={{background:"none",border:"none",cursor:"pointer",fontSize:14,marginRight:6}}>⬇</button>
                    <button onClick={() => dismiss(n.id)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontWeight:600,fontSize:12}}>忽略</button>
                  </>
                )}
              </td>
            </tr>
          ))}
          {notes.length === 0 && <tr><td colSpan="6" style={{textAlign:"center",color:"#9ca3af"}}>暂无 curiosity notes</td></tr>}
        </tbody>
      </table>
    </div>
  );
}

// ── App ──
function App() {
  const [tab, setTab] = useState("sessions");

  return (
    <>
      <div className="header">
        <h1>⚡ MMSG Dashboard</h1>
        <div className="tabs">
          <button className={`tab${tab==="sessions"?" active":""}`} onClick={()=>setTab("sessions")}>💬 Sessions</button>
          <button className={`tab${tab==="messages"?" active":""}`} onClick={()=>setTab("messages")}>📨 Messages</button>
          <button className={`tab${tab==="usage"?" active":""}`} onClick={()=>setTab("usage")}>📊 Usage</button>
          <button className={`tab${tab==="memory"?" active":""}`} onClick={()=>setTab("memory")}>🧠 Memory</button>
          <button className={`tab${tab==="curiosity"?" active":""}`} onClick={()=>setTab("curiosity")}>💭 Curiosity</button>
        </div>
      </div>
      {tab === "sessions" ? <SessionsView /> : tab === "messages" ? <MessagesView /> : tab === "usage" ? <UsageView /> : tab === "memory" ? <MemoryView /> : <CuriosityView />}
    </>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
